---
name: Test and lint
on: [push]
env:
  GOFUMPT_VERSION: v0.10.0
  GOIMPORTS_VERSION: v0.46.0
  GOLANGCILINT_COMMIT: c0d3ddc9cf3faa61a4e378e879ece580256d76e5
  GOLANGCILINT_VERSION: v2.12.2
jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26"

      - name: Build
        run: go build -v ./cmd/smoke

      - name: Install tool dependencies
        run: |
          go install "mvdan.cc/gofumpt@${{ env.GOFUMPT_VERSION }}"
          go install "golang.org/x/tools/cmd/goimports@${{ env.GOIMPORTS_VERSION }}"
          curl -sSfL "https://raw.githubusercontent.com/golangci/golangci-lint/${{ env.GOLANGCILINT_COMMIT }}/install.sh" | sh -s -- -b $(go env GOPATH)/bin "${{ env.GOLANGCILINT_VERSION }}"

      - name: Test
        run: go test -v ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: latest
