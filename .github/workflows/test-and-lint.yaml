---
name: Test and lint
on: [push]
env:
  GOFUMPT_VERSION: v0.10.0
  GOIMPORTS_VERSION: v0.45.0
  GOLANGCILINT_VERSION: v2.12.2
jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Build
        run: go build -v ./cmd/smoke

      - name: Install tool dependencies
        run: |
          go install "mvdan.cc/gofumpt@${{ env.GOFUMPT_VERSION }}"
          go install "golang.org/x/tools/cmd/goimports@${{ env.GOIMPORTS_VERSION }}"
          curl -sSfL "https://raw.githubusercontent.com/golangci/golangci-lint/${{ env.GOLANGCILINT_VERSION }}/install.sh" | sh -s -- -b $(go env GOPATH)/bin "${{ env.GOLANGCILINT_VERSION }}"

      - name: Test
        run: go test -v ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
